name: lotusplay
description: LotusPlay IPTV Player.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  video_player: ^2.8.2
  chewie: ^1.7.4
  google_fonts: ^6.1.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21

dependency_overrides:
  package_info_plus: 8.0.2
  wakelock_plus: 1.2.0

flutter:
  uses-material-design: true
