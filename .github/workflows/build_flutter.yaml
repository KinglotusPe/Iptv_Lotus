name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' 
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Android Platform Files
        # Critical step: creates android/ folder since we don't have it locally
        run: flutter create . --platforms android --project-name lotusplay

      - name: Patch Android Manifest (HTTP Support)
        run: python scripts/patch_manifest.py

      - name: Patch Android Signing (Consistent Keystore)
        run: python scripts/patch_signing.py

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Lotusplay.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lotusplay
          path: build/app/outputs/flutter-apk/Lotusplay.apk
